name: ai-video-preproduction-agent

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: foundation_local
      POSTGRES_USER: foundation
      POSTGRES_PASSWORD: foundation
    ports:
      - "127.0.0.1:54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foundation -d foundation_local"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro

volumes:
  postgres_data:
