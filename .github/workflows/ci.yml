name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install uv bootstrap tool
        run: python -m pip install --index-url https://pypi.org/simple uv==0.11.11

      - name: Install locked JavaScript dependencies
        run: ./scripts/run-with-node.sh npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: Install locked Python dependencies
        run: UV_CACHE_DIR=.cache/uv uv sync --locked --index-url https://pypi.org/simple

      - name: Run all quality gates
        run: make check
